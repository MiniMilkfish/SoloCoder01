<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人对战吃豆人</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">双人对战吃豆人</h1>
            <div class="game-info">
                <div class="player-info">
                    <div class="player-name player1">玩家1 (WASD)</div>
                    <div class="player-score">分数: <span id="player1-score">0</span></div>
                    <div class="player-lives">生命: <span id="player1-lives">3</span></div>
                </div>
                <div class="game-timer">
                    <div class="timer-label">剩余时间</div>
                    <div class="timer-value" id="game-timer">120</div>
                </div>
                <div class="player-info">
                    <div class="player-name player2">玩家2 (方向键)</div>
                    <div class="player-score">分数: <span id="player2-score">0</span></div>
                    <div class="player-lives">生命: <span id="player2-lives">3</span></div>
                </div>
            </div>
        </header>
        
        <div class="game-board-wrapper">
            <div class="game-board" id="game-board"></div>
        </div>
        
        <div class="game-controls">
            <button class="control-btn" id="pause-btn">暂停 (P)</button>
            <button class="control-btn" id="restart-btn">重新开始 (R)</button>
            <button class="control-btn" id="mute-btn">静音 (M)</button>
        </div>
        
        <div class="game-overlay" id="game-overlay">
            <div class="overlay-content">
                <h2 class="overlay-title" id="overlay-title">游戏开始</h2>
                <p class="overlay-message" id="overlay-message">按空格键开始游戏</p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
